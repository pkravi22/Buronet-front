# Name of your workflow
name: Deploy Next.js to Elastic Beanstalk

# Controls when the action will run.
on:
  # Triggers the workflow on push events
  push:
    branches: [ "main", "feature/tweaks" ]

jobs:
  build-and-deploy:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # ⭐️ FIX 1: Set a default working directory for all 'run' commands
    # This assumes your code (package.json, .next) is in a 'buronet-frontend' subdirectory.
    # If your project root is the repo root, remove this 'defaults' block.
    # defaults:
    #   run:
    #     working-directory: /buronet-frontend 

    steps:
      # --- 1. Set up your environment ---
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # ⭐️ FIX 2: Tell the cache action where to find the lock file
          cache-dependency-path: package-lock.json

      # --- 2. Build your Next.js App ---
      # This 'run' command will now execute inside the 'working-directory'
      - name: Install Dependencies
        run: npm install

      # --- 3. Create the ZIP file for EB ---
      # ⭐️ FIX 3: This command runs inside the 'working-directory'
      # It zips the contents of the *current* directory (.)
      # It places the final zip file one level up (../) in the root.
      - name: Generate Deployment ZIP
        run: zip -r deploy.zip . -x "node_modules/*" ".git/*" ".github/*"
        # run: zip -r deploy.zip package.json package-lock.json Procfile app public .platform

      - name: Show directory tree
        run: ls

      - name: Show Deployment ZIP Contents
        run: |
          # Create a temporary directory and unzip the package into it
          mkdir zip_contents
          unzip deploy.zip -d zip_contents
          echo "--- Contents of deploy.zip (Recursive List) ---"
          # List the contents recursively to see the structure
          ls -R zip_contents

      # --- 4. Configure AWS Credentials ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      # --- 5. Deploy to Elastic Beanstalk ---
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: eu-north-1
          application_name: buronet-app
          environment_name: buronet-user-website
          # ⭐️ FIX 4: The zip_file is now correctly found at the root
          deployment_package: deploy.zip
          version_label: "v${{ github.sha }}-${{ github.run_attempt }}"
          deployment_timeout: "5"
