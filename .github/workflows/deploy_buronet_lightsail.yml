name: Lightsail Deployment Workflow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Node.js Environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Install Dependencies
      - name: Install Dependencies
        run: |
          npm ci
          npm install mongodb

      # 3. Build the Application
      - name: Build Application
        env:
          NEXT_PUBLIC_DOTNET_BACKEND_BASE: "/api"
          NEXT_PUBLIC_JOBS_BACKEND_BASE: '/api'
          NEXT_PUBLIC_BYTES_BACKEND_BASE: '/api'
          NEXT_PUBLIC_MESSAGING_BACKEND_BASE: '/api'
          NEXT_PUBLIC_MESSAGE_SERVICE_BASE_URL: ''
          MONGO_URI: 'mongodb+srv://shobhit9887:0aX62ECWzZ4sOrzb@cluster0.uo5qhgj.mongodb.net/job_postings_db?retryWrites=true&w=majority&appName=Cluster0'
          NEXT_PUBLIC_CURRENT_AFFAIRS_API_KEY: 'pub_7ebcbabb30e44a098ef683a34a98453c'
        run: npm run build

      # 4. Create Deployment Archive (Tarball)
      - name: Create Deployment Tarball
        run: |
          tar -czf deploy.tar.gz .next public package.json node_modules package-lock.json next.config.js ecosystem.config.js
          
      # 5. Secure Copy (SCP) the Archive to Lightsail Instance
      - name: Transfer Archive to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/var/www/buronet-app"
          
      # 6. Extract Files and Restart App via PM2
      - name: Extract Files and Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd /var/www/buronet-app
            rm -rf .next node_modules
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            pm2 start ecosystem.config.js --update-env
            pm2 save
