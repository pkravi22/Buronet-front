name: EC2 Deployment Workflow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Node.js Environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Install Dependencies (Runner par)
      - name: Install Dependencies
        run: |
          npm ci
          npm install mongodb

      # 3. Build the Application (Runner par)
      - name: Build Application
        env:
          # Yahaan aapke saare NEXT_PUBLIC_ variables aayenge.
          NEXT_PUBLIC_DOTNET_BACKEND_BASE: "http://buronet-service-env.eba-btarxmsr.eu-north-1.elasticbeanstalk.com/api"
          NEXT_PUBLIC_JOBS_BACKEND_BASE: 'http://buronet-jobs-env.eba-btarxmsr.eu-north-1.elasticbeanstalk.com/api'
          NEXT_PUBLIC_BYTES_BACKEND_BASE: 'http://buronet-bytes-service.eba-btarxmsr.eu-north-1.elasticbeanstalk.com/api'
          NEXT_PUBLIC_MESSAGING_BACKEND_BASE: 'http://buronet-messaging-env.eba-btarxmsr.eu-north-1.elasticbeanstalk.com/api'
          NEXT_PUBLIC_MESSAGE_SERVICE_BASE_URL: 'http://buronet-messaging-env.eba-btarxmsr.eu-north-1.elasticbeanstalk.com'
          MONGO_URI: 'mongodb+srv://shobhit9887:0aX62ECWzZ4sOrzb@cluster0.uo5qhgj.mongodb.net/job_postings_db?retryWrites=true&w=majority&appName=Cluster0'

        run: npm run build

      # 4. FIX: Create Deployment Archive (Tarball)
      # --- Tar is reliable for including hidden files like .next ---
      - name: Create Deployment Tarball
        run: |
          tar -czf deploy.tar.gz .next public package.json node_modules package-lock.json next.config.js ecosystem.config.js
          
      # 5. Secure Copy (SCP) the Archive to EC2 Server
      - name: Transfer Archive to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/var/www/buronet-app" # Single tar file transfer ho raha hai
          
      # 6. Connect via SSH, Unzip, and Restart Application Process (PM2)
      - name: Extract Files and Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/buronet-app
            rm -rf .next node_modules # Delete old stuff
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            # Purely restarting - no building or installing
            pm2 start ecosystem.config.js --update-env
            pm2 save
