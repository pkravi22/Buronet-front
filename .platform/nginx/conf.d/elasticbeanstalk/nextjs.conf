# This configuration tells Nginx to serve Next.js static files
# directly, bypassing the Node.js server for better performance.

location /_next/static {
    # Sets the root directory for static files
    # /var/app/current/ is the standard EB path to your app
    alias /var/app/current/.next/static;

    # Caches the files for a long time in the browser
    expires max;
    add_header Cache-Control "public, max-age=31536000, immutable";
}